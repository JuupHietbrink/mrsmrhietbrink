<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mrs. & Mr. Hietbrink 💍</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />

  <!-- Leaflet.markercluster CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
  />

  <link rel="stylesheet" href="style.css" />

  <style>
    /* Inline cluster icon style — keep co-located with HTML for clarity */
    .cluster-icon {
      width: 40px;
      height: 40px;
      background: rgba(180, 80, 80, .85);
      border: 3px solid rgba(180, 80, 80, 1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: .82rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-titles">
        <span class="header-sub">💍 Mrs. &amp; Mr. Hietbrink</span>
        <h1>Wie komt er naar onze bruiloft?</h1>
      </div>
      <span id="guest-count">Laden…</span>
    </header>

    <div id="map"></div>
  </div>

  <!-- Leaflet JS -->
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN2GHsA="
    crossorigin=""
  ></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="script.js"></script>
</body>
</html>
