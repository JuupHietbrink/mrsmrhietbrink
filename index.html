<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mrs. & Mr. Hietbrink 💍</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet.markercluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <link rel="stylesheet" href="style.css" />

  <style>
    .guest-bubble {
      background: rgba(180, 80, 80, .75);
      border: 2px solid rgba(180, 80, 80, 1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: .82rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      transition: transform .15s;
      cursor: pointer;
    }
    .guest-bubble:hover {
      transform: scale(1.15);
    }
    .cluster-icon {
      width: 40px;
      height: 40px;
      background: rgba(180, 80, 80, .85);
      border: 3px solid rgba(180, 80, 80, 1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: .82rem;
      font-family: 'Segoe UI', system-ui, sans-serif;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="header-titles">
        <span class="header-sub">💍 Mrs. &amp; Mr. Hietbrink</span>
        <h1>Wie komt er naar onze bruiloft?</h1>
      </div>
      <span id="guest-count">Laden…</span>
    </header>
    <div id="map"></div>
    <div id="rickroll-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;align-items:center;justify-content:center;">
      <div style="position:relative;">
        <button onclick="document.getElementById('rickroll-overlay').style.display='none';document.getElementById('rickroll-video').src='';" style="position:absolute;top:-40px;right:0;background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;">✕</button>
        <iframe id="rickroll-video" width="560" height="315" frameborder="0" allow="autoplay" allowfullscreen style="border-radius:12px;"></iframe>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Leaflet.markercluster JS -->
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

  <script src="script.js"></script>
</body>
</html>
